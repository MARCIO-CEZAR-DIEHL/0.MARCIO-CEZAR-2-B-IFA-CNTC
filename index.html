<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Lateral</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #f4f7f6;
        }

        /* Estilização do Menu */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            transition: all 0.3s ease;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            text-align: center;
            padding: 20px 0;
            background-color: #1a252f;
        }

        .sidebar ul {
            list-style: none;
            padding: 20px 0;
        }

        .sidebar ul li a {
            display: block;
            padding: 15px 25px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar ul li a:hover {
            background-color: #34495e;
            color: white;
            border-left: 5px solid #3498db;
        }

        /* Botão de abrir/fechar */
        .toggle-btn {
            position: absolute;
            top: 15px;
            right: -50px;
            width: 50px;
            height: 50px;
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            border-radius: 0 5px 5px 0;
        }

        /* Conteúdo Principal */
        .content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
            transition: all 0.3s ease;
        }

        /* Classe para retrair o menu */
        .sidebar.active {
            width: 0;
        }

        .sidebar.active ~ .content {
            margin-left: 0;
        }

        .sidebar.active h2, 
        .sidebar.active ul, 
        .sidebar.active .toggle-btn {
            display: none;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="meuMenu">
        <h2>Menu</h2>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Perfil</a></li>
            <li><a href="#">Configurações</a></li>
            <li><a href="#">Notificações</a></li>
            <li><a href="#">Sair</a></li>
        </ul>
        <button class="toggle-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div class="content">
        
        <h1>Bem-vindo ao Início!</h1>
        <p>Este é o texto que aparece na página inicial do seu site.</p>
        
    </div>
    

    <script>
        function toggleMenu() {
            var menu = document.getElementById("meuMenu");
            menu.classList.toggle("active");
        }
    </script>

</body>
</html>
